};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
function sanitizeKey(k) { return String(k).replace(/[\/]/g, '_'); }

window.storage = {
  async get(key, shared) {
    const doc = await db.collection('app_storage').doc(sanitizeKey(key)).get();
    if (!doc.exists) { throw new Error('not_found'); }
    return { key, value: doc.data().value, shared: !!shared };
  },
  async set(key, value, shared) {
    await db.collection('app_storage').doc(sanitizeKey(key)).set({ value, updatedAt: Date.now() });
    return { key, value, shared: !!shared };
  },
  async delete(key, shared) {
    await db.collection('app_storage').doc(sanitizeKey(key)).delete();
    return { key, deleted: true, shared: !!shared };
  },
  async list(prefix, shared) {
    return { keys: [], prefix, shared: !!shared };
  },
  subscribe(key, shared, callback) {
    const unsub = db.collection('app_storage').doc(sanitizeKey(key))
      .onSnapshot({ includeMetadataChanges: true }, (doc) => {
        if (doc.metadata.hasPendingWrites) return; // ignora o eco otimista da propria escrita
        callback(doc.exists ? doc.data().value : null);
      }, (err) => { console.error('Erro de sincronizacao Firestore:', err); });
    return unsub;
  }
};

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function normalizar(s) {
  return String(s || '')
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .trim();
}

function acha(headers, ...termos) {
  for (let i = 0; i < headers.length; i++) {
    const h = normalizar(headers[i]);
    if (termos.some(t => h.includes(t))) return i;
  }
  return -1;
}

function chaveParada(item) {
  if (item.codcli) return `c:${normalizar(item.codcli)}`;
  return `${normalizar(item.cliente)}|${normalizar(item.cidade)}`;
}

function parseValorBR(v) {
  const n = parseFloat(String(v || '0').replace(/\./g, '').replace(',', '.'));
  return isNaN(n) ? 0 : n;
}

function formatBRL(v) {
  return v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function extrairCarroPlaca(texto) {
  let carro = '', placa = '';
  const mCarro = texto.match(/Carro:?\s*(\d+)/i);
  if (mCarro) carro = mCarro[1];
  const mPlaca = texto.match(/Placa:?\s*([A-Z]{2,3}\s?\d\s?[A-Z0-9]\s?\d{2,3})/i);
  if (mPlaca) placa = mPlaca[1].replace(/\s+/g, '');
  return { carro, placa };
}

const ROMANEIO_LINHA_RE = /^(\d{3,9})\s+(.+?)\s+(\d{5,9})\s+([A-ZÀ-Úa-zà-ú][A-ZÀ-Úa-zà-ú\s]*?)\s+(\d{1,3})\s+(A\s?VISTA|BOLETO)\s*(.*?)\s*-?\s*([\d.]+,\d{2})\s*$/;

function parseRomaneioTexto(texto) {
  const linhas = texto.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  const itens = [];
  let carroAtual = '', placaAtual = '';
  const carros = [];
  for (const linhaOriginal of linhas) {
    const mCarro = linhaOriginal.match(/Carro:?\s*(\d+)/i);
    if (mCarro) {
      carroAtual = mCarro[1];
      if (!carros.includes(carroAtual)) carros.push(carroAtual);
    }
    const mPlaca = linhaOriginal.match(/Placa:?\s*([A-Z]{2,3}\s?\d\s?[A-Z0-9]\s?\d{2,3})/i);
    if (mPlaca) placaAtual = mPlaca[1].replace(/\s+/g, '');

    const linha = linhaOriginal.replace(/([A-Za-zÀ-ÿ.])(\d{5,})/g, '$1 $2');
    const m = linha.match(ROMANEIO_LINHA_RE);
    if (!m) continue;
    const [, codcli, cliente, nf, cidade, , , , valor] = m;
    itens.push({
      id: uid(), codcli, nf, cliente: cliente.trim(), endereco: '', cidade: cidade.trim(),
      volumes: '', rotaCarga: carroAtual, placa: placaAtual, valor,
      status: 'pendente', motivo: '', obs: '', horario: null,
    });
  }
  const somasEsperadas = [...texto.matchAll(/Entregas:\s*(\d+)\s*Notas:\s*(\d+)/gi)].map(m => parseInt(m[2], 10));
  const notasEsperadas = somasEsperadas.length ? somasEsperadas.reduce((a, b) => a + b, 0) : null;
  return { itens, carros, notasEsperadas };
}

          if (!ativo) return;
          aplicarValor(raw);
          setLoaded(true);
        });
      } else {
        // modo compatível com o ambiente do Claude (busca única)
        try {
          const res = await window.storage.get(STORAGE_KEY, true);
          if (res && res.value) aplicarValor(res.value);
        } catch (e) {
          // sem dados ainda
        }
        setLoaded(true);
      }
    })();

    return () => { ativo = false; if (unsub) unsub(); };
  }, []);

  useEffect(() => {
    if (!loaded) return;
    (async () => {
      setSaving(true);
      try {

      map.get(key).itens.push(it);

    return Array.from(map.values()).map(p => {
      const todasEntregues = p.itens.every(i => i.status === 'entregue');

  async function handleImportFile(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setImportErro('');
    setImportInfo(null);
    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: 'array' });
      const wsName = wb.SheetNames[0];
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[wsName], { header: 1, raw: false, defval: '' });

      // o arquivo pode conter o romaneio completo, com vários carros/rotas seguidos.
      // localiza cada bloco "Carro: N" e processa cada um separadamente.
      const marcadores = [];
      for (let r = 0; r < rows.length; r++) {
        if (/carro:?\s*\d+/i.test(rows[r].join(' '))) marcadores.push(r);
      }
      const segmentos = marcadores.length > 0
        ? marcadores.map((inicio, idx) => ({ inicio, fim: idx + 1 < marcadores.length ? marcadores[idx + 1] : rows.length }))
        : [{ inicio: 0, fim: rows.length }];

      function scanCol(segRows, hIdx, colStart, colEnd, testFn) {
        if (colStart == null || colEnd == null || colStart < 0 || colEnd < 0) return -1;
        for (let c = Math.max(0, colStart); c <= colEnd; c++) {
          let hits = 0, total = 0;
          for (let r = hIdx + 1; r < Math.min(segRows.length, hIdx + 15); r++) {
            const v = String(segRows[r][c] ?? '').trim();
            if (!v) continue;
            total++;
            if (testFn(v)) hits++;
          }
          if (total >= 2 && hits / total >= 0.7) return c;
        }
        return -1;
      }

      const novos = [];
      const carrosEncontrados = [];
      let segmentosSemColunas = 0;

      for (const seg of segmentos) {
        const segRows = rows.slice(seg.inicio, seg.fim);
        const textoTopo = segRows.slice(0, 15).map(r => r.join(' ')).join('\n');
        const { carro, placa } = extrairCarroPlaca(textoTopo);
        if (carro && !carrosEncontrados.includes(carro)) carrosEncontrados.push(carro);

        let headerRowIdx = -1, headers = [];
        for (let r = 0; r < Math.min(segRows.length, 20); r++) {
          const row = segRows[r];
          const hits = [
            acha(row, 'codcli', 'cod cli'),
            acha(row, 'razao social', 'cliente', 'destinat'),
            acha(row, 'cidade', 'municipio'),
            acha(row, 'nota', 'nf', 'n.f'),
            acha(row, 'rota', 'carga', 'carro'),
            acha(row, 'placa'),
            acha(row, 'endereco', 'endereço', 'logradouro'),
            acha(row, 'vlr', 'valor'),
          ].filter(v => v >= 0).length;
          if (hits >= 2) { headerRowIdx = r; headers = row; break; }
        }
        if (headerRowIdx === -1) { segmentosSemColunas++; continue; }

        const clienteCol = acha(headers, 'razao social', 'cliente', 'destinat');
        const codcliCol = acha(headers, 'codcli', 'cod cli', 'cod. cliente');
        const cidadeCol = acha(headers, 'cidade', 'municipio');
        const bancoCol = acha(headers, 'banco');
        const enderecoCol = acha(headers, 'endereco', 'endereço', 'logradouro');
        const rotaCargaColHeader = acha(headers, 'carro', 'rota', 'carga');
        const placaColHeader = acha(headers, 'placa');
        const volumesCol = acha(headers, 'volume', 'qtd', 'quantidade');
        let nfCol = acha(headers, 'nota fiscal', 'n.f', 'nota', 'nf');
        let valorCol = acha(headers, 'vlr nf', 'valor nf', 'vlr', 'valor');

        if (nfCol < 0 && clienteCol >= 0 && cidadeCol > clienteCol) {
          nfCol = scanCol(segRows, headerRowIdx, clienteCol + 1, cidadeCol - 1, v => /^\d{5,9}$/.test(v));
        }
        if (valorCol < 0 && bancoCol >= 0) {
          valorCol = scanCol(segRows, headerRowIdx, bancoCol + 1, bancoCol + 3, v => /^[\d.]+,\d{2}$/.test(v));
        } else if (valorCol < 0 && cidadeCol >= 0) {
          valorCol = scanCol(segRows, headerRowIdx, cidadeCol + 1, cidadeCol + 10, v => /^[\d.]+,\d{2}$/.test(v));
        }

        for (let r = headerRowIdx + 1; r < segRows.length; r++) {
          const row = segRows[r];
          const nf = nfCol >= 0 ? String(row[nfCol] || '').trim() : '';
          const cliente = clienteCol >= 0 ? String(row[clienteCol] || '').trim() : '';
          if (!nf && !cliente) continue;
          novos.push({
            id: uid(),
            codcli: codcliCol >= 0 ? String(row[codcliCol] || '').trim() : '',
            nf: nf || '—',
            cliente: cliente || 'Sem nome',
            endereco: enderecoCol >= 0 ? String(row[enderecoCol] || '').trim() : '',
            cidade: cidadeCol >= 0 ? String(row[cidadeCol] || '').trim() : '',
            volumes: volumesCol >= 0 ? String(row[volumesCol] || '').trim() : '',
            rotaCarga: (rotaCargaColHeader >= 0 ? String(row[rotaCargaColHeader] || '').trim() : '') || carro,
            placa: (placaColHeader >= 0 ? String(row[placaColHeader] || '').trim() : '') || placa,
            valor: valorCol >= 0 ? String(row[valorCol] || '').trim() : '',
            status: 'pendente', motivo: '', obs: '', horario: null,
          });
        }
      }

      if (novos.length === 0) {
        setImportErro('O arquivo foi lido, mas nenhuma linha com Nota Fiscal ou Cliente foi encontrada. Verifique se a planilha tem colunas como Codcli, Razão Social e Cidade.');
        return;
      }

      setItems(prev => [...prev, ...novos]);
      setImportInfo({ total: novos.length, carros: carrosEncontrados, avisoParcial: segmentosSemColunas > 0 });
    } catch (err) {
      setImportErro('Não foi possível ler esse arquivo. Confirme que é um .xlsx, .xls ou .csv válido.');
    } finally {
      if (fileInputRef.current) fileInputRef.current.value = '';
    }
  }

  function handleImportTexto() {
    setImportErro('');
    setImportInfo(null);
    if (!pasteText.trim()) {
      setImportErro('Cole o texto do romaneio antes de processar.');
      return;
    }
    const { itens, carros, notasEsperadas } = parseRomaneioTexto(pasteText);
    if (itens.length === 0) {
      setImportErro('Não consegui reconhecer nenhuma linha de nota nesse texto. Confira se o texto foi colado sem alterações, com uma nota por linha.');
      return;
    }
    setItems(prev => [...prev, ...itens]);
    let aviso = '';
    if (notasEsperadas && itens.length !== notasEsperadas) {
      aviso = ` O romaneio indica ${notasEsperadas} nota(s) ao todo; confira se todas as linhas foram coladas corretamente.`;
    }
    setImportInfo({ total: itens.length, aviso, carros });
    setPasteText('');
  }

  function abrirConfirmacao(key) {
    setConfirmFor(key);
    setRecebedor('');
    setHasSignature(false);
  }

  function getPos(e, canvas) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
  }

  function iniciarTraço(e) {
    e.preventDefault();
    const canvas = canvasRef.current;
    if (!canvas) return;
    drawingRef.current = true;
    const ctx = canvas.getContext('2d');
    const pos = getPos(e, canvas);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
  }

  function desenhar(e) {
    if (!drawingRef.current) return;
    e.preventDefault();
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    const pos = getPos(e, canvas);
    ctx.lineTo(pos.x, pos.y);
    ctx.strokeStyle = '#0B2545';
    ctx.lineWidth = 2.4;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();
    if (!hasSignature) setHasSignature(true);
  }

  function finalizarTraço() {
    drawingRef.current = false;
  }

  function limparAssinatura() {
    const canvas = canvasRef.current;
    if (!canvas) return;
    canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
    setHasSignature(false);
  }

  function confirmarComAssinatura() {
    if (!hasSignature || !confirmFor) return;
    const assinatura = canvasRef.current.toDataURL('image/png');
    const horario = new Date().toISOString();
    const recebedorFinal = recebedor.trim();
    setItems(prev => prev.map(i => chaveParada(i) === confirmFor
      ? { ...i, status: 'entregue', motivo: '', horario, assinatura, recebedor: recebedorFinal }
      : i));
    setConfirmFor(null);
    setOpenId(null);
  }

  function marcarNaoEntregue(key, motivo) {
    setItems(prev => prev.map(i => chaveParada(i) === key
      ? { ...i, status: 'nao_entregue', motivo, horario: new Date().toISOString() }
      : i));
    setMotivoFor(null);
    setOpenId(null);
  }

  function reabrir(key) {
    setItems(prev => prev.map(i => chaveParada(i) === key
      ? { ...i, status: 'pendente', motivo: '', horario: null, assinatura: '', recebedor: '' }
      : i));
  }

  function removeParada(key) {
    setItems(prev => prev.filter(i => chaveParada(i) !== key));
  }

  function removeNota(id) {
    setItems(prev => prev.filter(i => i.id !== id));
  }

  function zerarCarga() {

                  onClick={handleImportTexto}
                  disabled={!pasteText.trim()}
                  style={{ width: '100%', marginTop: 10, background: !pasteText.trim() ? '#C7D0DA' : '#1E5F8C', color: '#fff', border: 'none', borderRadius: 12, padding: '13px 0', fontWeight: 700, fontSize: 14, cursor: 'pointer' }}
                >
                  Processar texto colado
                </button>
              </>
            )}

            {importErro && (
              <div style={{ marginTop: 14, fontSize: 12.5, color: '#D64545', background: '#FDEBEB', padding: '10px 12px', borderRadius: 10 }}>
                <AlertTriangle size={13} style={{ marginRight: 5, verticalAlign: -2 }} />{importErro}
              </div>
            )}

            {importInfo && (
              <div style={{ marginTop: 14, fontSize: 12.5, color: '#2E8B57', background: '#EAF6EF', padding: '10px 12px', borderRadius: 10 }}>
                <Check size={13} style={{ marginRight: 5, verticalAlign: -2 }} />
                {importInfo.total} nota(s) importada(s){importInfo.carros && importInfo.carros.length > 0 ? ` — Carro(s) ${importInfo.carros.join(', ')}` : ''}.
                {importInfo.avisoParcial && <div style={{ color: '#B8860B', marginTop: 4 }}>Algum trecho do arquivo não foi reconhecido — confira se todas as notas entraram.</div>}
                {importInfo.aviso && <div style={{ color: '#B8860B', marginTop: 4 }}>{importInfo.aviso}</div>}
              </div>
            )}

            <button onClick={() => { setShowImport(false); setImportInfo(null); setImportErro(''); }} style={{ width: '100%', marginTop: 14, background: 'none', border: 'none', color: '#7A8CA0', fontSize: 13, cursor: 'pointer', padding: '6px 0' }}>
              Fechar
            </button>
          </div>
        </div>
      )}

      {/* Modal confirmar entrega com assinatura do canhoto */}
      {confirmFor && (() => {
        const parada = paradas.find(p => p.key === confirmFor);
        if (!parada) return null;
        const nfs = parada.itens.map(i => i.nf).join(', ');
        return (
          <div style={{ position: 'fixed', inset: 0, background: 'rgba(11,37,69,0.5)', display: 'flex', alignItems: 'flex-end', zIndex: 30 }} onClick={() => setConfirmFor(null)}>
            <div onClick={e => e.stopPropagation()} style={{ background: '#fff', width: '100%', borderRadius: '20px 20px 0 0', padding: '20px 18px 24px' }}>
              <div style={{ width: 40, height: 4, background: '#E3E9EF', borderRadius: 3, margin: '0 auto 16px' }} />
              <div style={{ fontSize: 16, fontWeight: 700, color: '#0B2545' }}>
                Confirmar entrega {parada.itens.length > 1 ? `— ${parada.itens.length} notas` : `— NF ${parada.itens[0].nf}`}
              </div>
              <div style={{ fontSize: 12.5, color: '#7A8CA0', marginBottom: 14 }}>{parada.cliente} · {parada.cidade}{parada.itens.length > 1 ? ` · NFs ${nfs}` : ''}</div>

              <label style={{ fontSize: 12, color: '#5A7089', fontWeight: 600 }}>Nome de quem recebeu (opcional)</label>
              <input
                value={recebedor}
                onChange={e => setRecebedor(e.target.value)}
                placeholder="Ex: João, no balcão"
                style={{ width: '100%', marginTop: 4, marginBottom: 14, padding: '11px 12px', borderRadius: 10, border: '1.5px solid #E3E9EF', fontSize: 14, outline: 'none' }}
              />

              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
                <label style={{ fontSize: 12, color: '#5A7089', fontWeight: 600 }}>
                  <PenTool size={12} style={{ verticalAlign: -1, marginRight: 4 }} />Assinatura do canhoto
                </label>
                <button onClick={limparAssinatura} style={{ background: 'none', border: 'none', color: '#7A8CA0', fontSize: 11.5, display: 'flex', alignItems: 'center', gap: 4, cursor: 'pointer' }}>
                  <Eraser size={12} /> Limpar
                </button>
              </div>

              <div style={{ position: 'relative', borderRadius: 12, border: '1.5px dashed #B7CBE0', background: '#FAFCFE', overflow: 'hidden' }}>
                {!hasSignature && (
                  <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 13, color: '#B7C4D2', pointerEvents: 'none' }}>
                    Assine aqui com o dedo
                  </div>
                )}
                <canvas
                  ref={canvasRef}
                  width={320}
                  height={150}
                  style={{ width: '100%', height: 150, display: 'block', touchAction: 'none' }}
                  onPointerDown={iniciarTraço}
                  onPointerMove={desenhar}
                  onPointerUp={finalizarTraço}
                  onPointerLeave={finalizarTraço}
                />
              </div>

              <button
                onClick={confirmarComAssinatura}
                disabled={!hasSignature}
                style={{ width: '100%', marginTop: 16, background: !hasSignature ? '#C7D0DA' : '#2E8B57', color: '#fff', border: 'none', borderRadius: 12, padding: '13px 0', fontWeight: 700, fontSize: 14, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6, cursor: hasSignature ? 'pointer' : 'not-allowed' }}
              >
                <Check size={16} /> Confirmar entrega
              </button>
              <button onClick={() => setConfirmFor(null)} style={{ width: '100%', marginTop: 8, background: 'none', border: 'none', color: '#7A8CA0', fontSize: 13, cursor: 'pointer', padding: '6px 0' }}>
                Cancelar
              </button>
            </div>
          </div>
        );
      })()}

      {/* Visão geral por carro */}
      {showVisaoGeral && (
        <div style={{ position: 'fixed', inset: 0, background: '#F5F7F9', zIndex: 40, display: 'flex', flexDirection: 'column' }}>
          <div style={{ background: '#0B2545', color: '#fff', padding: '18px 16px 14px', display: 'flex', alignItems: 'center', gap: 10 }}>
            <button onClick={() => setShowVisaoGeral(false)} style={{ background: 'rgba(255,255,255,0.12)', border: 'none', borderRadius: 8, padding: 7, display: 'flex', cursor: 'pointer' }}>
              <X size={16} color="#fff" />
            </button>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 15, fontWeight: 700 }}>Visão geral</div>
              <div style={{ fontSize: 11.5, color: '#9FB3C8' }}>{resumoPorCarro.length} carro(s) na carga de hoje</div>
            </div>
          </div>

          <div style={{ flex: 1, overflowY: 'auto', padding: '14px 16px 24px' }}>
            <div style={{ display: 'flex', gap: 8, marginBottom: 14 }}>
              <div style={{ flex: 1, background: '#fff', borderRadius: 12, padding: '12px 10px', textAlign: 'center', boxShadow: '0 1px 3px rgba(11,37,69,0.06)' }}>
                <div className="num" style={{ fontSize: 22, fontWeight: 800, color: '#0B2545' }}>{total}</div>
                <div style={{ fontSize: 10.5, color: '#7A8CA0' }}>paradas</div>
              </div>
              <div style={{ flex: 1, background: '#fff', borderRadius: 12, padding: '12px 10px', textAlign: 'center', boxShadow: '0 1px 3px rgba(11,37,69,0.06)' }}>
                <div className="num" style={{ fontSize: 22, fontWeight: 800, color: '#2E8B57' }}>{counts.entregue}</div>
                <div style={{ fontSize: 10.5, color: '#7A8CA0' }}>entregues</div>
              </div>
              <div style={{ flex: 1, background: '#fff', borderRadius: 12, padding: '12px 10px', textAlign: 'center', boxShadow: '0 1px 3px rgba(11,37,69,0.06)' }}>
                <div className="num" style={{ fontSize: 22, fontWeight: 800, color: '#D64545' }}>{counts.nao_entregue}</div>
                <div style={{ fontSize: 10.5, color: '#7A8CA0' }}>não entreg.</div>
              </div>
            </div>

            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              {resumoPorCarro.map(r => {
                const pct = r.total ? Math.round((r.entregue / r.total) * 100) : 0;
                return (
                  <div key={r.carro} style={{ background: '#fff', borderRadius: 14, padding: '14px 16px', boxShadow: '0 1px 4px rgba(11,37,69,0.08)' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                      <div>
                        <div style={{ fontSize: 15, fontWeight: 700, color: '#0B2545' }}>Carro {r.carro}</div>
                        {r.placa && <div style={{ fontSize: 11.5, color: '#7A8CA0' }}>{r.placa}</div>}
                      </div>
                      <button
                        onClick={() => { setFiltroCarro(r.carro); setShowVisaoGeral(false); }}
                        style={{ background: '#EAF2F8', border: 'none', borderRadius: 8, padding: '7px 12px', fontSize: 11.5, fontWeight: 700, color: '#1E5F8C', cursor: 'pointer' }}
                      >
                        Ver paradas
                      </button>
                    </div>

                    <div style={{ height: 8, background: '#EFF2F5', borderRadius: 6, overflow: 'hidden', marginBottom: 8 }}>
                      <div style={{ width: `${pct}%`, height: '100%', background: 'linear-gradient(90deg,#2E8B57,#6FCF97)' }} />
                    </div>

                    <div style={{ display: 'flex', gap: 14, fontSize: 11.5, color: '#5A7089', flexWrap: 'wrap' }}>
                      <span><strong style={{ color: '#2E8B57' }}>{r.entregue}</strong> entregues</span>
                      <span><strong style={{ color: '#D64545' }}>{r.nao_entregue}</strong> não entreg.</span>
                      <span><strong style={{ color: '#E8A33D' }}>{r.pendente}</strong> pendentes</span>
                      <span style={{ marginLeft: 'auto', fontWeight: 700, color: '#0B2545' }}>R$ {formatBRL(r.valorEntregue)} / {formatBRL(r.valorTotal)}</span>
                    </div>
                  </div>
                );
              })}
              {resumoPorCarro.length === 0 && (
                <div style={{ textAlign: 'center', padding: '40px 20px', color: '#9FB3C8', fontSize: 13 }}>
                  Nenhuma carga carregada ainda.
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      {/* Relatório de canhotos */}
      {showRelatorio && (() => {
        const listaAtiva = relatorioTab === 'entregue' ? paradasEntregues : relatorioTab === 'nao_entregue' ? paradasNaoEntregues : paradasPendentes;
        const corAtiva = STATUS[relatorioTab].color;
        return (
          <div style={{ position: 'fixed', inset: 0, background: '#F5F7F9', zIndex: 40, display: 'flex', flexDirection: 'column' }}>
            <div style={{ background: '#0B2545', color: '#fff', padding: '18px 16px 14px', display: 'flex', alignItems: 'center', gap: 10 }}>
              <button onClick={() => setShowRelatorio(false)} style={{ background: 'rgba(255,255,255,0.12)', border: 'none', borderRadius: 8, padding: 7, display: 'flex', cursor: 'pointer' }}>
                <X size={16} color="#fff" />
              </button>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 15, fontWeight: 700 }}>Relatório de canhotos</div>
                <div style={{ fontSize: 11.5, color: '#9FB3C8' }}>{rota.nome}{rota.motorista ? ` · ${rota.motorista}` : ''}</div>
              </div>
            </div>

            <div style={{ padding: '12px 16px 0', display: 'flex', gap: 8 }}>
              {[
                { key: 'entregue', label: 'Entregues', n: counts.entregue },
                { key: 'nao_entregue', label: 'Não entreg.', n: counts.nao_entregue },
                { key: 'pendente', label: 'Pendentes', n: counts.pendente },
              ].map(t => (
                <button
                  key={t.key}
                  onClick={() => setRelatorioTab(t.key)}
                  style={{
                    flex: 1, padding: '9px 0', borderRadius: 10, border: 'none', cursor: 'pointer',
                    background: relatorioTab === t.key ? STATUS[t.key].color : '#fff', color: relatorioTab === t.key ? '#fff' : '#5A7089',
                    fontSize: 12, fontWeight: 700, boxShadow: '0 1px 3px rgba(11,37,69,0.08)'
                  }}
                >
                  {t.label} · {t.n}
                </button>
              ))}
            </div>

            <div style={{ padding: '10px 16px', display: 'flex', gap: 8 }}>
              <button
                onClick={() => setRelatorioComoTexto(v => !v)}
                style={{ flex: 1, background: '#fff', border: '1.5px solid #E3E9EF', borderRadius: 10, padding: '9px 0', fontSize: 12, fontWeight: 700, color: '#1E5F8C', cursor: 'pointer' }}
              >
                {relatorioComoTexto ? 'Ver em lista' : 'Ver como texto (copiar)'}
              </button>
              <button
                onClick={() => window.print()}
                style={{ background: '#fff', border: '1.5px solid #E3E9EF', borderRadius: 10, padding: '9px 14px', fontSize: 12, fontWeight: 700, color: '#5A7089', cursor: 'pointer' }}
              >
                Imprimir / PDF
              </button>
            </div>

            <div id="relatorio-imprimir" style={{ flex: 1, overflowY: 'auto', padding: '4px 16px 24px' }}>
              {relatorioComoTexto ? (
                <>
                  <div style={{ fontSize: 11.5, color: '#7A8CA0', marginBottom: 8 }}>
                    Toque na caixa abaixo, selecione tudo e copie para enviar por WhatsApp, e-mail etc.
                  </div>
                  <textarea
                    readOnly
                    value={gerarRelatorioTexto()}
                    onFocus={e => e.target.select()}
                    style={{ width: '100%', minHeight: 420, borderRadius: 12, border: '1.5px solid #E3E9EF', padding: 12, fontSize: 12, fontFamily: 'monospace', background: '#fff', color: '#0B2545' }}
                  />
                </>
              ) : (
                <>
                  <div style={{ fontSize: 12.5, color: '#5A7089', fontWeight: 700, margin: '10px 0' }}>
                    Total em {STATUS[relatorioTab].label.toLowerCase()}: R$ {formatBRL(valorSecao(listaAtiva))}
                  </div>
                  {listaAtiva.length === 0 && (
                    <div style={{ textAlign: 'center', padding: '40px 20px', color: '#9FB3C8', fontSize: 13 }}>
                      Nenhuma parada nessa categoria.
                    </div>
                  )}
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                    {listaAtiva.map(p => (
                      <div key={p.key} style={{ background: '#fff', borderRadius: 12, padding: '12px 14px', boxShadow: '0 1px 3px rgba(11,37,69,0.06)', borderLeft: `4px solid ${corAtiva}` }}>
                        <div style={{ fontSize: 13.5, fontWeight: 700, color: '#0B2545' }}>{p.cliente}</div>
                        <div style={{ fontSize: 11.5, color: '#7A8CA0', marginTop: 1 }}>{p.cidade} · NF {p.itens.map(i => i.nf).join(', ')}</div>
                        <div style={{ display: 'flex', gap: 6, marginTop: 6, flexWrap: 'wrap', alignItems: 'center' }}>
                          {p.valorTotal > 0 && <span style={{ fontSize: 10.5, fontWeight: 700, color: '#2E8B57', background: '#EAF6EF', padding: '2px 7px', borderRadius: 6 }}>R$ {formatBRL(p.valorTotal)}</span>}
                          {p.horario && <span style={{ fontSize: 10.5, color: '#5A7089' }}>{new Date(p.horario).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}</span>}
                          {p.recebedor && <span style={{ fontSize: 10.5, color: '#5A7089' }}>· {p.recebedor}</span>}
                        </div>
                        {p.status === 'nao_entregue' && p.motivo && (
                          <div style={{ fontSize: 11.5, color: '#D64545', marginTop: 6 }}>Motivo: {p.motivo}</div>
                        )}
                        {p.status === 'entregue' && p.assinatura && (
                          <img src={p.assinatura} alt="assinatura" style={{ height: 28, marginTop: 6, background: '#F5F9FC', borderRadius: 5, border: '1px solid #E3E9EF' }} />
                        )}
                      </div>
                    ))}
                  </div>
                </>
              )}
            </div>
          </div>
        );
      })()}

      {/* Modal configurações */}
      {showConfig && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(11,37,69,0.5)', display: 'flex', alignItems: 'flex-end', zIndex: 30 }} onClick={() => { setShowConfig(false); setConfirmZerar(false); }}>
          <div onClick={e => e.stopPropagation()} style={{ background: '#fff', width: '100%', borderRadius: '20px 20px 0 0', padding: '20px 18px 24px' }}>
            <div style={{ width: 40, height: 4, background: '#E3E9EF', borderRadius: 3, margin: '0 auto 16px' }} />
            <div style={{ fontSize: 16, fontWeight: 700, color: '#0B2545', marginBottom: 4 }}>Configurações</div>
            <div style={{ fontSize: 12.5, color: '#7A8CA0', marginBottom: 18 }}>
              {total} parada(s) na lista atual · {counts.entregue} confirmada(s)
            </div>

            <button
              onClick={() => { setShowConfig(false); setShowVisaoGeral(true); }}
              style={{ width: '100%', display: 'flex', alignItems: 'center', gap: 10, background: '#EAF2F8', border: '1.5px solid #D6E4F0', borderRadius: 12, padding: '13px 14px', color: '#1E5F8C', fontWeight: 700, fontSize: 13.5, cursor: 'pointer', marginBottom: 10 }}
            >
              <Truck size={17} /> Visão geral (todos os carros)
            </button>

            <button
              onClick={() => { setShowConfig(false); setShowRelatorio(true); setRelatorioTab('entregue'); setRelatorioComoTexto(false); }}
              style={{ width: '100%', display: 'flex', alignItems: 'center', gap: 10, background: '#EAF2F8', border: '1.5px solid #D6E4F0', borderRadius: 12, padding: '13px 14px', color: '#1E5F8C', fontWeight: 700, fontSize: 13.5, cursor: 'pointer', marginBottom: 10 }}
            >
              <FileSpreadsheet size={17} /> Relatório de canhotos
            </button>

            {!confirmZerar ? (
              <button
                onClick={() => setConfirmZerar(true)}
                style={{ width: '100%', display: 'flex', alignItems: 'center', gap: 10, background: '#FDEBEB', border: '1.5px solid #F2C9C9', borderRadius: 12, padding: '13px 14px', color: '#D64545', fontWeight: 700, fontSize: 13.5, cursor: 'pointer' }}
              >
                <Trash2 size={17} /> Zerar carga do dia
              </button>
            ) : (
              <div style={{ background: '#FDEBEB', borderRadius: 12, padding: '14px' }}>
                <div style={{ fontSize: 13, color: '#D64545', fontWeight: 600, marginBottom: 12, lineHeight: 1.4 }}>
                  Isso vai apagar todas as {total} nota(s) da lista atual para todo mundo que tem o link. Use isso só ao iniciar a carga de um novo dia. Confirma?
                </div>
                <div style={{ display: 'flex', gap: 8 }}>
                  <button onClick={zerarCarga} style={{ flex: 1, background: '#D64545', color: '#fff', border: 'none', borderRadius: 10, padding: '11px 0', fontWeight: 700, fontSize: 13, cursor: 'pointer' }}>
                    Sim, zerar tudo
                  </button>
                  <button onClick={() => setConfirmZerar(false)} style={{ flex: 1, background: '#fff', color: '#5A7089', border: '1.5px solid #E3E9EF', borderRadius: 10, padding: '11px 0', fontWeight: 700, fontSize: 13, cursor: 'pointer' }}>
                    Cancelar
                  </button>
                </div>
              </div>
            )}

            <button onClick={() => { setShowConfig(false); setConfirmZerar(false); }} style={{ width: '100%', marginTop: 14, background: 'none', border: 'none', color: '#7A8CA0', fontSize: 13, cursor: 'pointer', padding: '6px 0' }}>
              Fechar
            </button>
          </div>
        </div>
      )}

      {/* Modal motivo não entrega */}
      {motivoFor && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(11,37,69,0.45)', display: 'flex', alignItems: 'flex-end', zIndex: 30 }} onClick={() => setMotivoFor(null)}>
          <div onClick={e => e.stopPropagation()} style={{ background: '#fff', width: '100%', borderRadius: '20px 20px 0 0', padding: '20px 18px 24px' }}>
            <div style={{ width: 40, height: 4, background: '#E3E9EF', borderRadius: 3, margin: '0 auto 16px' }} />
            <div style={{ fontSize: 16, fontWeight: 700, color: '#0B2545', marginBottom: 4 }}>Motivo da não entrega</div>
            <div style={{ fontSize: 12.5, color: '#7A8CA0', marginBottom: 14 }}>Selecione o motivo para registrar a ocorrência.</div>
            {MOTIVOS.map(m => (
              <button
                key={m}
                onClick={() => marcarNaoEntregue(motivoFor, m)}
                style={{ width: '100%', textAlign: 'left', background: '#F5F7F9', border: 'none', borderRadius: 10, padding: '13px 14px', fontSize: 13.5, color: '#1E3A5F', marginBottom: 8, cursor: 'pointer', fontWeight: 500 }}
              >
                {m}
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}


const rootEl = document.getElementById('root');
ReactDOM.createRoot(rootEl).render(React.createElement(AppEntregas));

</script>
</body>
</html>
